name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (OIDC — no token needed)

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        # Uses OIDC trusted publishing — configure at:
        # https://pypi.org/manage/project/dissent/settings/publishing/
        # Set publisher: GitHub, repo: PR0CK0/dissent, workflow: publish.yml
